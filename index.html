<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preguntale a Sócrates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=EB+Garamond:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --papyrus: #EDE4D0;
    --papyrus-2: #E4D8BE;
    --ink: #2B2118;
    --ink-soft: #5A4E3F;
    --terracotta: #B5502F;
    --terracotta-dark: #8A3B21;
    --olive: #6B7050;
    --gold: #A6822E;
    --rule: #C9BB98;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--papyrus);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(181,80,47,0.04), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(107,112,80,0.05), transparent 40%);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px 60px;
  }
  .page{
    width: 100%;
    max-width: 640px;
  }
  .masthead{
    text-align: center;
    margin-bottom: 8px;
  }
  .masthead .eyebrow{
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  .masthead h1{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 44px;
    margin: 0;
    letter-spacing: 0.01em;
  }
  .masthead .sub{
    font-style: italic;
    color: var(--ink-soft);
    font-size: 16px;
    margin: 6px 0 0;
  }
  .meander{
    width: 100%;
    height: 22px;
    margin: 18px 0 30px;
    opacity: 0.75;
  }
  .dialogue{
    background: rgba(255,252,244,0.35);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 8px 28px;
    min-height: 140px;
    max-height: 52vh;
    overflow-y: auto;
  }
  .turn{
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
  }
  .turn:last-child{ border-bottom: none; }
  .speaker{
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  .speaker.soc{ color: var(--terracotta-dark); }
  .speaker.you{ color: var(--olive); }
  .line{
    font-size: 19px;
    line-height: 1.65;
    margin: 0;
    white-space: pre-wrap;
  }
  .line.thinking{
    color: var(--ink-soft);
    font-style: italic;
  }
  .empty-hint{
    font-style: italic;
    color: var(--ink-soft);
    font-size: 16px;
    text-align: center;
    padding: 40px 10px;
  }
  form{
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }
  textarea{
    flex: 1;
    resize: none;
    font-family: 'EB Garamond', serif;
    font-size: 18px;
    padding: 12px 16px;
    border: 1px solid var(--rule);
    border-radius: 2px;
    background: rgba(255,252,244,0.5);
    color: var(--ink);
    height: 54px;
  }
  textarea:focus{
    outline: none;
    border-color: var(--terracotta);
  }
  button{
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    background: var(--terracotta);
    color: #FBF3E7;
    border: none;
    border-radius: 2px;
    padding: 0 22px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover{ background: var(--terracotta-dark); }
  button:disabled{ background: var(--rule); cursor: default; }
  .footer-note{
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="page">
  <div class="masthead">
    <p class="eyebrow">Un diálogo, no un resumen</p>
    <h1>Preguntale a Sócrates</h1>
    <p class="sub">Método socrático · mayéutica aplicada</p>
  </div>

  <svg class="meander" viewBox="0 0 640 22" preserveAspectRatio="none">
    <polyline points="0,18 20,18 20,4 40,4 40,18 60,18 60,4 80,4 80,18 100,18 100,4 120,4 120,18 140,18 140,4 160,4 160,18 180,18 180,4 200,4 200,18 220,18 220,4 240,4 240,18 260,18 260,4 280,4 280,18 300,18 300,4 320,4 320,18 340,18 340,4 360,4 360,18 380,18 380,4 400,4 400,18 420,18 420,4 440,4 440,18 460,18 460,4 480,4 480,18 500,18 500,4 520,4 520,18 540,18 540,4 560,4 560,18 580,18 580,4 600,4 600,18 620,18 620,4 640,4"
      fill="none" stroke="#B5502F" stroke-width="1.5"/>
  </svg>

  <div class="dialogue" id="dialogue">
    <div class="empty-hint" id="hint">Planteale a Sócrates una idea, una duda o una convicción tuya.<br>Él no va a resolvértela — va a preguntar.</div>
  </div>

  <form id="form">
    <textarea id="input" placeholder="Por ejemplo: creo que la libertad es hacer lo que uno quiere..." required></textarea>
    <button type="submit" id="sendBtn">Preguntar</button>
  </form>
  <p class="footer-note">Cada respuesta de Sócrates es generada en el momento — no hay guion.</p>
</div>

<script>
const dialogueEl = document.getElementById('dialogue');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const hint = document.getElementById('hint');

let history = [];

function addTurn(speaker, text, isThinking){
  hint.style.display = 'none';
  const turn = document.createElement('div');
  turn.className = 'turn';
  const label = document.createElement('p');
  label.className = 'speaker ' + (speaker === 'Sócrates' ? 'soc' : 'you');
  label.textContent = speaker;
  const line = document.createElement('p');
  line.className = 'line' + (isThinking ? ' thinking' : '');
  line.textContent = text;
  turn.appendChild(label);
  turn.appendChild(line);
  dialogueEl.appendChild(turn);
  dialogueEl.scrollTop = dialogueEl.scrollHeight;
  return line;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const userText = input.value.trim();
  if(!userText) return;

  addTurn('Vos', userText, false);
  history.push({ role: 'user', content: userText });
  input.value = '';
  sendBtn.disabled = true;

  const thinkingLine = addTurn('Sócrates', 'reflexiona...', true);

  try{
    const response = await fetch('/api/socrates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history })
    });
    const data = await response.json();
    const reply = data.reply || '...';
    thinkingLine.classList.remove('thinking');
    thinkingLine.textContent = reply;
    history.push({ role: 'assistant', content: reply });
  }catch(err){
    thinkingLine.classList.remove('thinking');
    thinkingLine.textContent = "(Sócrates se quedó en silencio. Algo falló al conectar. Probá de nuevo.)";
  }finally{
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
